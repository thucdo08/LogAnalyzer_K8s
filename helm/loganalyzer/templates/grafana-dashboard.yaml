{{- if .Values.monitoring.grafana.enabled }}
# =============================================================
# Grafana Dashboard — Auto-provision qua ConfigMap
# Grafana sidecar (kube-prometheus-stack) sẽ tự phát hiện
# ConfigMap có label grafana_dashboard=1 và import vào
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    grafana_dashboard: "1"      # Label này trigger Grafana sidecar import
    app: {{ .Release.Name }}
    component: observability
data:
  loganalyzer-dashboard.json: |
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "annotations": { "list": [] },
      "description": "LogAnalyzer Security Platform - SRE Dashboard",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "🟢 Pod Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{deployment=~\"loganalyzer-.*\", namespace=\"loganalyzer\"}",
              "legendFormat": "{{`{{deployment}}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "📊 Log Analysis Rate (req/min)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "reqps"
            }
          },
          "targets": [
            {
              "expr": "rate(loganalyzer_requests_total[5m]) * 60",
              "legendFormat": "Requests/min",
              "refId": "A"
            },
            {
              "expr": "rate(loganalyzer_errors_total[5m]) * 60",
              "legendFormat": "Errors/min",
              "refId": "B"
            }
          ]
        },
        {
          "id": 3,
          "title": "⚡ Uptime (seconds)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": { "colorMode": "background", "graphMode": "area" },
          "fieldConfig": {
            "defaults": { "unit": "s", "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 300 },
                  { "color": "green", "value": 3600 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "loganalyzer_uptime_seconds",
              "legendFormat": "Uptime",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "💾 CPU Usage by Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percentunit" }
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"loganalyzer\", container!=\"\"}[5m])",
              "legendFormat": "{{`{{pod}}`}} / {{`{{container}}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "🧠 Memory Usage by Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"loganalyzer\", container!=\"\"}",
              "legendFormat": "{{`{{pod}}`}} / {{`{{container}}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "📈 HPA Replica Count",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"loganalyzer\"}",
              "legendFormat": "{{`{{horizontalpodautoscaler}}`}} (current)",
              "refId": "A"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"loganalyzer\"}",
              "legendFormat": "{{`{{horizontalpodautoscaler}}`}} (max)",
              "refId": "B"
            }
          ]
        },
        {
          "id": 7,
          "title": "🛡️ Security Rules Loaded",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": { "colorMode": "background" },
          "targets": [
            {
              "expr": "loganalyzer_rules_loaded",
              "legendFormat": "Rules",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "🔴 Error Rate %",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0, "max": 1,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "rate(loganalyzer_errors_total[5m]) / rate(loganalyzer_requests_total[5m])",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["loganalyzer", "sre", "security"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "Asia/Ho_Chi_Minh",
      "title": "LogAnalyzer Security Platform",
      "uid": "loganalyzer-sre-v1",
      "version": 1
    }
{{- end }}
