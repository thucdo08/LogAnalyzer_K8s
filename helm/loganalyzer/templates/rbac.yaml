# =============================================================
# RBAC — Role-Based Access Control
# Principle of Least Privilege: mỗi service chỉ có quyền tối thiểu
# Backend dùng ServiceAccount riêng, không dùng 'default' SA
# =============================================================

# --- ServiceAccount cho backend ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loganalyzer-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}-backend
    component: rbac
  annotations:
    # Nếu dùng AWS IRSA (IAM Roles for Service Accounts)
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/loganalyzer-backend-role
    description: "ServiceAccount cho LogAnalyzer backend — chỉ read ConfigMap/Secrets"
automountServiceAccountToken: false   # Không mount token mặc định (security)

---
# --- Role: quyền tối thiểu trong namespace loganalyzer ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: loganalyzer-backend-role
  namespace: {{ .Values.namespace }}
  labels:
    component: rbac
rules:
# Chỉ được đọc ConfigMap (để load rules.json từ K8s)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
# Chỉ được đọc Secret của chính mình (OPENAI_API_KEY, MONGODB_URI)
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["loganalyzer-secrets"]
  verbs: ["get"]
# Không có quyền gì khác: không create/delete/patch pods, deployments, etc.

---
# --- RoleBinding: gắn Role vào ServiceAccount ---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: loganalyzer-backend-rolebinding
  namespace: {{ .Values.namespace }}
  labels:
    component: rbac
subjects:
- kind: ServiceAccount
  name: loganalyzer-backend
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: loganalyzer-backend-role
  apiGroup: rbac.authorization.k8s.io
