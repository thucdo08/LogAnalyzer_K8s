{{- if .Values.secrets.enabled }}
# =============================================================
# K8s Secret — Quản lý thông tin nhạy cảm an toàn
# KHÔNG commit secret values thật vào Git!
# Giá trị thật được inject qua:
#   - CI/CD: helm upgrade --set secrets.openaiKey=$OPENAI_KEY
#   - Hoặc: External Secrets Operator (sync từ AWS Secrets Manager)
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: loganalyzer-secrets
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}
    component: secret-management
  annotations:
    # Ghi chú về nguồn gốc secret (không chứa giá trị thật)
    secret-source: "Injected via CI/CD pipeline (GitHub Actions / Jenkins)"
    # Uncomment nếu dùng External Secrets Operator với AWS Secrets Manager:
    # externalsecrets.k8s-external-secrets.io/source: "aws-secrets-manager"
type: Opaque
stringData:
  # === API Keys ===
  # Giá trị sẽ được override khi deploy qua CI/CD:
  # helm upgrade loganalyzer ./helm/loganalyzer \
  #   --set secrets.openaiKey=$OPENAI_API_KEY \
  #   --set secrets.mongodbUri=$MONGODB_URI
  OPENAI_API_KEY: {{ .Values.secrets.openaiKey | quote }}
  MONGODB_URI: {{ .Values.secrets.mongodbUri | quote }}

  # === AWS Credentials (nếu dùng S3 cold storage) ===
  # AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | default "" | quote }}
  # AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | default "" | quote }}
{{- end }}
