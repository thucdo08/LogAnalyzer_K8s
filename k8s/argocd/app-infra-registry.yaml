# ArgoCD Application theo dõi infra (registry, ingress) - GitOps cho infra layer
# kubectl apply -f argocd/app-infra.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-registry
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/thucdo08/LogAnalyzer_K8s.git
    targetRevision: main
    path: k8s/registry                  # Thư mục chứa registry-core/ui/ingress yamls
  destination:
    server: https://kubernetes.default.svc
    namespace: registry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
