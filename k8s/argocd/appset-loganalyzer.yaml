# ArgoCD ApplicationSet cho LogAnalyzer
# Trigger từ Helm chart trong Git repo
# kubectl apply -f k8s/argocd/appset-loganalyzer.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: loganalyzer-appset
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - env: production
        namespace: loganalyzer
        host: loganalyzer.dofuta.site
  template:
    metadata:
      name: "loganalyzer-{{env}}"
      labels:
        app: loganalyzer
        env: "{{env}}"
      annotations:
        # Manual tag update mode (no argocd-image-updater)
    spec:
      project: default
      source:
        repoURL: https://github.com/thucdo08/LogAnalyzer_K8s.git
        targetRevision: main
        path: helm/loganalyzer
        helm:
          valueFiles:
          - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true        # Xóa resource không còn trong Git
          selfHeal: true     # Tự khôi phục nếu ai đó sửa tay trên cluster
        syncOptions:
        - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
